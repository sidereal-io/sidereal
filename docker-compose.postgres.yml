# PostgreSQL override for Sidereal
#
# Layer this on top of the base compose file to use PostgreSQL instead of SQLite:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#   docker compose -f docker-compose.prod.yml -f docker-compose.postgres.yml up -d
#
# Requires POSTGRES_PASSWORD set in .env or environment:
#   echo "POSTGRES_PASSWORD=your_secure_password" > .env

services:
  sidereal:
    environment:
      - DATABASE_URL=postgresql://sidereal:${POSTGRES_PASSWORD}@sidereal-db:5432/sidereal
    depends_on:
      sidereal-db:
        condition: service_healthy
    networks:
      - sidereal-network

  sidereal-db:
    image: postgres:15-alpine
    container_name: sidereal-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sidereal
      - POSTGRES_USER=sidereal
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - sidereal-database:/var/lib/postgresql/data
    networks:
      - sidereal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidereal -d sidereal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Don't expose PostgreSQL port externally for security

networks:
  sidereal-network:
    driver: bridge

volumes:
  sidereal-database:
    driver: local
