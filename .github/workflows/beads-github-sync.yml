name: Sync Beads to GitHub Issues

on:
  push:
    branches: [main]
  
  issues:
    # Catching these specific types ensures you don't run 
    # the workflow on irrelevant events like 'pinned'
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled, assigned, unassigned]
  
  issue_comment:
    # Tracking conversations may look awkward because the 
    # comment will appear to come from the bot user
    types: [created, edited, deleted]

  # Manual run, with an optional dry-run preview.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without writing to GitHub or pushing state"
        type: boolean
        default: false

# Never let two syncs overlap -- concurrent runs can race on the same issues.
concurrency:
  group: beads-github-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Bidirectional Beads Sync
    runs-on: ubuntu-latest

    permissions:
      contents: write    # fetch/push refs/dolt/data and commit the refreshed mirror
      issues: write      # create / update GitHub issues

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # make origin reachable/authed for bd dolt pull & push

      - name: Install bd
        run: |
          curl -fsSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash
      
      - name: Setup Git Credentials for Dolt
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Hydrate beads database from Dolt remote and Sync
        run: |
          bd bootstrap --yes

      - name: Sync Beads <-> GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            bd github sync --dry-run
          else
            bd github sync
            bd dolt push
          fi
          