name: Sync beads to GitHub issues

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without writing to GitHub"
        type: boolean
        default: false

concurrency:
  group: beads-github-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITHUB_OWNER: sidereal-io
      GITHUB_REPO: sidereal
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install beads (bd) v1.0.4
        run: |
          set -euo pipefail
          VERSION=1.0.4
          ASSET="beads_${VERSION}_linux_amd64.tar.gz"
          BASE="https://github.com/gastownhall/beads/releases/download/v${VERSION}"
          curl -sSL -o "$ASSET" "$BASE/$ASSET"
          curl -sSL -o checksums.txt "$BASE/checksums.txt"
          grep " ${ASSET}\$" checksums.txt | sha256sum -c -
          tar -xzf "$ASSET"
          sudo install -m 0755 bd /usr/local/bin/bd
          bd version

      - name: Sync beads -> GitHub
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            tools/scripts/sync-beads-github.sh --dry-run
          else
            tools/scripts/sync-beads-github.sh
          fi

      # Persist the bd<->GitHub mapping (external_ref) captured by the sync so
      # the next run is idempotent. Only on real (non-dry-run) executions, and
      # only when the export actually changed. GITHUB_TOKEN pushes do not
      # retrigger workflows, so this does not loop; [skip ci] is belt-and-suspenders.
      - name: Persist bd<->GitHub mapping
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .beads/issues.jsonl; then
            echo "No mapping changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .beads/issues.jsonl
          git commit -m "chore(beads): persist GitHub issue mapping [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"
