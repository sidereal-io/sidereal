name: Close Gated Beads on PR Merge

on:
  pull_request:
    types: [closed]

  # Manual re-run for a specific PR (e.g. if the merge event was missed).
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number whose gated beads should be closed"
        required: true
        type: string

# Share the sync lock so we never race the beads<->GitHub sync.
concurrency:
  group: beads-github-sync
  cancel-in-progress: false

jobs:
  gate-check:
    name: Resolve gh:pr gates and close gated beads
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions:
      contents: write # push refs/dolt/data
      pull-requests: read # bd gate check queries PR merge status via gh

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bd
        run: curl -fsSL https://raw.githubusercontent.com/gastownhall/beads/main/scripts/install.sh | bash

      - name: Setup Git credentials for Dolt
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Hydrate beads from Dolt remote
        run: bd bootstrap --yes

      - name: Close beads gated on this merged PR, then resolve the gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          export BD_NON_INTERACTIVE=1

          # Gate id(s) that were waiting on THIS PR (await_id == PR number).
          gates=$(bd gate list --all --json \
            | jq -c --arg pr "$PR_NUMBER" \
                '[.[] | select(.await_type == "gh:pr" and (.await_id | tostring) == $pr) | .id]')

          # Close the bead each of those gates was blocking — the work has merged.
          # (GitHub closes the mirrored issue itself via the PR's closing keyword;
          #  this only cleans up the beads side. bd gate check does NOT close beads.)
          bd list --json \
            | jq -r --argjson gates "$gates" \
                '.[] | select(any((.dependencies // [])[];
                                  .dependency_type == "blocks" and (.id | IN($gates[])))) | .id' \
            | while read -r bead; do
                echo "Closing $bead (PR #$PR_NUMBER merged)"
                bd close "$bead" --reason "PR #$PR_NUMBER merged"
              done

          # Resolve the now-satisfied gate(s) so they don't linger as open gates.
          bd gate check --type=gh:pr

      - name: Push beads state to Dolt
        run: bd dolt push || true
