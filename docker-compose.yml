# Sidereal Docker Compose Configuration (SQLite — no external database needed)
#
# Usage: docker compose up -d
#
# For PostgreSQL instead of SQLite, layer the postgres override:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d

services:
  sidereal:
    build: .
    container_name: sidereal
    restart: unless-stopped
    ports:
      - "${SIDEREAL_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - XMP_SIDECAR_PATH=/app/sidecars
      - IMMICH_MAPPING_PATH=/usr/src/app/upload
      - LOCAL_MAPPING_PATH=/immich-upload
      - STORAGE_PATH=/app/data/images
      - AUTO_DB_MIGRATE_FROM=${AUTO_DB_MIGRATE_FROM:-}
      - AUTO_DB_MIGRATE_TO=${AUTO_DB_MIGRATE_TO:-}
      - AUTO_DB_MIGRATE_ONCE=${AUTO_DB_MIGRATE_ONCE:-true}
      - AUTO_DB_MIGRATE_MARKER=${AUTO_DB_MIGRATE_MARKER:-/app/config/.auto-db-migrated}
      - AUTO_DB_MIGRATE_RESET_SQLITE=${AUTO_DB_MIGRATE_RESET_SQLITE:-true}
    volumes:
      - sidereal-config:/app/config
      - sidereal-logs:/app/logs
      - sidereal-sidecars:/app/sidecars
      - sidereal-cache:/app/cache
      - sidereal-images:/app/data/images
      - sidereal_immich-upload:/immich-upload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sidereal-config:
    driver: local
  sidereal-logs:
    driver: local
  sidereal-sidecars:
    driver: local
  sidereal-cache:
    driver: local
  sidereal-images:
    driver: local
  sidereal_immich-upload:
    external: true
